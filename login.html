<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập | Bongda888.VN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b' }, brand: { blue: '#3b82f6', green: '#10b981' } } } }
        }
    </script>
    <style>body { background-color: #020617; color: #f8fafc; }</style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-900 rounded-2xl border border-slate-800 p-8 shadow-2xl">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-2">
                <i class="ph-fill ph-soccer-ball text-3xl text-brand-blue"></i>
                <span class="text-2xl font-bold tracking-tight">Bongda888</span>
            </a>
            <h2 class="text-xl font-semibold text-white">Chào mừng trở lại</h2>
            <p class="text-sm text-gray-400 mt-1">Đăng nhập để xem kèo và dự đoán</p>
        </div>

        <div id="messageBox" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email hoặc Số điện thoại</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-user text-gray-400 text-lg"></i>
                    </div>
                    <input type="text" id="loginId" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="Email hoặc SĐT (09...)">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-gray-300">Mật khẩu</label>
                    <a href="quenmatkhau.html" class="text-xs text-brand-blue hover:text-blue-400 transition">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-lock-key text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" id="password" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-brand-blue hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition flex justify-center items-center gap-2">
                Đăng Nhập
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
            Chưa có tài khoản? <a href="register.html" class="text-brand-blue hover:text-blue-400 font-medium transition">Đăng ký ngay</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyBIamnJhv5opEZ3D9dAJOWbW0YEBgSPPTc",
            authDomain: "bongda888.firebaseapp.com",
            projectId: "bongda888",
            storageBucket: "bongda888.firebasestorage.app",
            messagingSenderId: "341048440291",
            appId: "1:341048440291:web:f87f61b46b0f188c4a1cd6",
            measurementId: "G-4R3DDMMZ3K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Xóa khoảng trắng 2 đầu
            const loginId = document.getElementById('loginId').value.trim(); 
            const password = document.getElementById('password').value;

            // Regex kiểm tra định dạng
            const isPhone = /^0[0-9]{9}$/.test(loginId);
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(loginId);

            if (!isPhone && !isEmail) {
                showMessage("Định dạng không hợp lệ. Vui lòng nhập Email hoặc SĐT 10 số (Bắt đầu bằng 0).", "error");
                return;
            }

            submitBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Đang xử lý...';
            submitBtn.disabled = true;

            // NẾU LÀ SỐ ĐIỆN THOẠI
            if (isPhone) {
                // TƯƠNG LAI: Chỗ này bạn sẽ gọi Firebase Firestore (Database) 
                // để tìm xem Số điện thoại này tương ứng với Email nào, sau đó mới mang Email đó đi đăng nhập.
                // Ví dụ: const email = await getEmailByPhoneFromDatabase(loginId);
                
                showMessage("Đăng nhập bằng SĐT đang được bảo trì (Cần kết nối Database). Vui lòng đăng nhập bằng Email tạm thời!", "error");
                submitBtn.innerHTML = 'Đăng Nhập';
                submitBtn.disabled = false;
                return; 
            }

            // NẾU LÀ EMAIL (Chạy chuẩn Firebase Auth)
            if (isEmail) {
                signInWithEmailAndPassword(auth, loginId, password)
                    .then((userCredential) => {
                        showMessage("Đăng nhập thành công!", "success");
                        window.location.href = "home.html";
                    })
                    .catch((error) => {
                        submitBtn.innerHTML = 'Đăng Nhập';
                        submitBtn.disabled = false;
                        
                        let errorMsg = "Đăng nhập thất bại. Vui lòng thử lại!";
                        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                            errorMsg = "Tài khoản hoặc mật khẩu không chính xác.";
                        }
                        if (error.code === 'auth/too-many-requests') {
                            errorMsg = "Tài khoản bị khóa tạm thời do đăng nhập sai nhiều lần.";
                        }
                        
                        showMessage(errorMsg, "error");
                    });
            }
        });

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-green-500/10', 'text-brand-green', 'border', 'border-red-500/20', 'border-green-500/20');
            
            if (type === 'error') {
                messageBox.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500/20');
            } else {
                messageBox.classList.add('bg-green-500/10', 'text-brand-green', 'border', 'border-green-500/20');
            }
        }
    </script>
</body>
</html>
