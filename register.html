<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Ký | Bongda888.VN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b' }, brand: { blue: '#3b82f6', green: '#10b981', yellow: '#fbbf24' } } } }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 sm:p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-brand-blue/20 blur-[60px] pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 border border-slate-700 mb-4 shadow-lg">
                <i class="ph-fill ph-soccer-ball text-4xl text-brand-blue animate-spin-slow"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-black text-white tracking-tight mb-1">Tạo tài khoản mới</h1>
            <p class="text-sm text-gray-400">Tham gia dự đoán bóng đá ngay hôm nay</p>
        </div>

        <div id="messageBox" class="hidden mb-6 p-4 rounded-xl text-sm font-semibold flex items-center gap-2 border transition-all">
            <i id="messageIcon" class="text-xl"></i>
            <span id="messageText"></span>
        </div>

        <form id="registerForm" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-envelope text-gray-400 text-lg"></i>
                    </div>
                    <input type="email" id="email" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="nhan@gmail.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Số điện thoại</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-phone text-gray-400 text-lg"></i>
                    </div>
                    <input type="tel" id="phone" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="0817xxxxxx">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-lock-key text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" id="password" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="••••••••">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Nhập lại mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-check-circle text-gray-400 text-lg"></i>
                    </div>
                    <input type="password" id="repassword" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-brand-blue hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2 mt-4 active:scale-95">
                <span>Đăng Ký Ngay</span>
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-8 relative z-10">
            Đã có tài khoản? <a href="login.html" class="text-brand-blue font-bold hover:underline">Đăng nhập</a>
        </p>
    </div>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIamnJhv5opEZ3D9dAJOWbW0YEBgSPPTc",
            authDomain: "bongda888.firebaseapp.com",
            projectId: "bongda888",
            storageBucket: "bongda888.firebasestorage.app",
            messagingSenderId: "341048440291",
            appId: "1:341048440291:web:f87f61b46b0f188c4a1cd6",
            measurementId: "G-4R3DDMMZ3K"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const messageIcon = document.getElementById('messageIcon');

        function showMessage(msg, type) {
            messageBox.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/30', 'text-red-400', 'bg-green-500/10', 'border-green-500/30', 'text-brand-green');
            messageIcon.className = 'text-xl';
            
            if (type === 'error') {
                messageBox.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
                messageIcon.classList.add('ph-fill', 'ph-warning-circle');
            } else {
                messageBox.classList.add('bg-green-500/10', 'border-green-500/30', 'text-brand-green');
                messageIcon.classList.add('ph-fill', 'ph-check-circle');
            }
            
            messageText.textContent = msg;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const repassword = document.getElementById('repassword').value;

            if (password !== repassword) {
                showMessage("Mật khẩu nhập lại không khớp!", "error"); return;
            }
            if (password.length < 6) {
                showMessage("Mật khẩu phải từ 6 ký tự trở lên.", "error"); return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="ph ph-spinner-gap animate-spin text-xl"></i> Đang tạo tài khoản...`;

            try {
                // Bước 1: Tạo tài khoản Đăng nhập
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Bước 2: Tạo mã UserCode
                const userCode = user.uid.substring(0, 6).toUpperCase();

                // Bước 3: Tạo Ví trên Firestore (Nếu chỗ này treo, Code mới sẽ bắt được lỗi)
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    phone: phone,
                    userCode: userCode,
                    balance: 0,
                    createdAt: new Date().toISOString()
                });

                // Khởi tạo ví 0 đồng trên LocalStorage để load nhanh
                localStorage.setItem('userBalance', '0');
                localStorage.setItem('betHistory', '[]');

                showMessage("Tạo tài khoản thành công! Đang vào sảnh...", "success");
                setTimeout(() => { window.location.href = "home.html"; }, 1500);

            } catch (error) {
                console.error(error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Đăng Ký Ngay</span>`;
                
                // Bắt chính xác lỗi để báo cho bạn
                if (error.code === 'auth/email-already-in-use') {
                    showMessage("Email này đã được sử dụng!", "error");
                } else if (error.code === 'permission-denied') {
                    showMessage("LỖI QUAN TRỌNG: Bạn chưa tạo Firestore Database hoặc chưa đặt Rules sang Test Mode! Hãy xem lại hướng dẫn.", "error");
                } else {
                    showMessage("Lỗi: " + error.message, "error");
                }
            }
        });
    </script>
</body>
</html>
