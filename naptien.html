<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Xu Tự Động | Bongda888.VN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b' }, brand: { blue: '#3b82f6', green: '#10b981', yellow: '#fbbf24' } } } }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        /* Ẩn nút tăng giảm của thẻ input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col hidden" id="mainBody">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 glass-nav h-16">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
            <a href="home.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="ph-bold ph-arrow-left text-xl text-gray-400 hover:text-white"></i>
                <i class="ph-fill ph-soccer-ball text-2xl text-brand-blue ml-2"></i>
                <span class="text-xl font-bold tracking-tight hidden sm:block">Bongda888</span>
            </a>
            
            <div class="flex items-center gap-4 sm:gap-6">
                <!-- Số dư -->
                <div class="bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-inner">
                    <i class="ph-fill ph-coins text-brand-yellow text-lg"></i>
                    <span class="font-bold text-sm" id="userBalanceDisplay">0</span> <span class="text-xs text-gray-400">Xu</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-grow pt-24 pb-12 px-4 flex items-center justify-center w-full">
        <div class="bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col md:flex-row">
            
            <!-- CỘT TRÁI: NHẬP SỐ TIỀN -->
            <div class="w-full md:w-1/2 p-8 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-center">
                <h2 class="text-3xl font-black text-white mb-2 tracking-tight">Nạp Xu Tự Động</h2>
                <p class="text-sm text-gray-400 mb-8">Hệ thống gạch cước VietQR trong 3 giây. Tỉ lệ quy đổi: <strong class="text-brand-yellow">1 VNĐ = 1 Xu</strong>.</p>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-300 mb-3">Chọn số tiền nạp nhanh</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setAmount(50000)" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-brand-blue text-white py-3 rounded-xl font-bold transition">50.000 VNĐ</button>
                        <button onclick="setAmount(100000)" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-brand-blue text-white py-3 rounded-xl font-bold transition">100.000 VNĐ</button>
                        <button onclick="setAmount(200000)" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-brand-blue text-white py-3 rounded-xl font-bold transition">200.000 VNĐ</button>
                        <button onclick="setAmount(500000)" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-brand-blue text-white py-3 rounded-xl font-bold transition">500.000 VNĐ</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-3">Hoặc nhập số tiền tùy ý (Tối thiểu 3,000 VNĐ)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-400 font-bold">₫</span>
                        </div>
                        <input type="number" id="amountInput" oninput="handleInput()" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl pl-10 pr-4 py-4 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition font-bold text-lg" placeholder="Ví dụ: 50000">
                    </div>
                    <p id="errorMsg" class="text-red-400 text-sm mt-2 hidden flex items-center gap-1"><i class="ph-fill ph-warning-circle"></i> <span>Số tiền tối thiểu là 3,000 VNĐ</span></p>
                </div>

                <div class="mt-auto pt-6 border-t border-slate-800">
                    <div class="flex justify-between items-center bg-brand-yellow/10 border border-brand-yellow/20 p-4 rounded-xl">
                        <span class="text-sm font-medium text-gray-300">Thực nhận:</span>
                        <div class="flex items-center gap-2">
                            <i class="ph-fill ph-coins text-brand-yellow text-2xl animate-pulse"></i>
                            <span id="xuReceive" class="text-2xl font-black text-brand-yellow">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CỘT PHẢI: MÃ QR -->
            <div class="w-full md:w-1/2 p-8 bg-slate-950 flex flex-col items-center justify-center relative">
                
                <!-- Box chứa QR -->
                <div class="bg-white p-4 rounded-2xl shadow-xl shadow-blue-500/10 w-64 h-64 flex items-center justify-center relative mb-6">
                    <!-- Placeholder khi chưa nhập tiền -->
                    <div id="qrPlaceholder" class="text-center">
                        <i class="ph-duotone ph-qr-code text-6xl text-slate-300 mb-2"></i>
                        <p class="text-sm text-slate-500 font-medium">Nhập số tiền để tạo mã</p>
                    </div>
                    
                    <!-- Ảnh QR (Ẩn mặc định) -->
                    <img id="qrImage" src="" class="w-full h-full object-contain hidden rounded-xl" alt="Mã VietQR">
                </div>

                <div class="text-center w-full max-w-xs">
                    <p class="text-gray-400 text-sm mb-4 leading-relaxed">Mở ứng dụng ngân hàng và <strong class="text-white">quét mã QR</strong>. Nội dung chuyển khoản đã được điền tự động.</p>
                    
                    <!-- Nút xác nhận chuyển khoản (Chỉ hiện khi QR đã load) -->
                    <button id="confirmTransferBtn" onclick="simulatePayment()" class="hidden w-full bg-brand-blue hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                        <i class="ph-bold ph-check-circle text-xl"></i> Tôi đã chuyển khoản
                    </button>
                    <p id="loadingMsg" class="hidden text-brand-green text-sm font-bold mt-4 animate-pulse">Đang kiểm tra giao dịch...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- SCRIPTS FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBIamnJhv5opEZ3D9dAJOWbW0YEBgSPPTc",
            authDomain: "bongda888.firebaseapp.com",
            projectId: "bongda888",
            storageBucket: "bongda888.firebasestorage.app",
            messagingSenderId: "341048440291",
            appId: "1:341048440291:web:f87f61b46b0f188c4a1cd6",
            measurementId: "G-4R3DDMMZ3K"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // BẢO MẬT: Phải đăng nhập mới được nạp tiền
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById('mainBody').classList.remove('hidden');
                loadBalance();
            }
        });

        let currentBalance = 0;
        function loadBalance() {
            const savedBalance = localStorage.getItem('userBalance');
            currentBalance = savedBalance ? parseInt(savedBalance) : 1000;
            document.getElementById('userBalanceDisplay').textContent = currentBalance.toLocaleString('vi-VN');
        }

        // HÀM GLOBAL CHO HTML
        window.setAmount = setAmount;
        window.handleInput = handleInput;
        window.simulatePayment = simulatePayment;

        let debounceTimer;

        // Bấm nút tiền nhanh
        function setAmount(amount) {
            document.getElementById('amountInput').value = amount;
            handleInput();
        }

        // Xử lý khi gõ tiền
        function handleInput() {
            clearTimeout(debounceTimer);
            const input = document.getElementById('amountInput').value;
            const amount = parseInt(input);
            const errorMsg = document.getElementById('errorMsg');
            const xuReceive = document.getElementById('xuReceive');
            const qrImage = document.getElementById('qrImage');
            const qrPlaceholder = document.getElementById('qrPlaceholder');
            const confirmBtn = document.getElementById('confirmTransferBtn');

            if (!amount || amount < 3000) {
                errorMsg.classList.remove('hidden');
                xuReceive.textContent = "0";
                qrImage.classList.add('hidden');
                qrPlaceholder.classList.remove('hidden');
                confirmBtn.classList.add('hidden');
                return;
            }

            // Hợp lệ
            errorMsg.classList.add('hidden');
            xuReceive.textContent = amount.toLocaleString('vi-VN');

            // Delay 500ms để người dùng gõ xong mới load ảnh API cho mượt
            debounceTimer = setTimeout(() => {
                // Tạo random mã GD
                const randomCode = "NAPXU" + Math.floor(1000 + Math.random() * 9000);
                
                // Link API Sepay (Ngân hàng nhận là MBBank, STK là 4477040408)
                const qrUrl = `https://qr.sepay.vn/img?acc=4477040408&bank=MBBank&amount=${amount}&des=${randomCode}&template=compact`;
                
                qrImage.src = qrUrl;
                qrPlaceholder.classList.add('hidden');
                qrImage.classList.remove('hidden');
                confirmBtn.classList.remove('hidden');
            }, 500);
        }

        // GIẢ LẬP GIAO DỊCH (DÀNH CHO TEST FRONTEND)
        function simulatePayment() {
            const input = document.getElementById('amountInput').value;
            const amount = parseInt(input);
            const btn = document.getElementById('confirmTransferBtn');
            const msg = document.getElementById('loadingMsg');

            btn.classList.add('hidden');
            msg.classList.remove('hidden');

            // Đợi 2.5 giây mô phỏng hệ thống đang check ngân hàng
            setTimeout(() => {
                // Cộng tiền vào LocalStorage
                currentBalance += amount;
                localStorage.setItem('userBalance', currentBalance);
                
                alert(`Giao dịch thành công! Đã nạp ${amount.toLocaleString('vi-VN')} Xu vào tài khoản.`);
                
                // Trở về trang chủ
                window.location.href = "home.html";
            }, 2500);
        }
    </script>
</body>
</html>
